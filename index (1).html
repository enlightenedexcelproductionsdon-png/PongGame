<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Pong</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Simple Pong</h1>
    <div class="scoreboard">
      <span id="leftScore">0</span>
      <span>:</span>
      <span id="rightScore">0</span>
    </div>
    <canvas id="game"></canvas>
    <div class="controls">
      Controls: Move the left paddle with your mouse or Up/Down arrow keys. Click canvas to start/pause.
    </div>
    <div class="footer">
      First to 10 wins. Refresh to reset.
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
